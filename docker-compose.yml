services:
  monitor:
    image: livingdocs/postgres:15.3
    container_name: pg-monitor
    hostname: monitor
    ports:
      - "5432:5432"
    networks:
      - pgnet
    command: sleep infinity

  node1:
    image: livingdocs/postgres:15.3
    container_name: pg-node1
    hostname: node1
    ports:
      - "5433:5432"
    networks:
      - pgnet
    command: sleep infinity

  node2:
    image: livingdocs/postgres:15.3
    container_name: pg-node2
    hostname: node2
    ports:
      - "5434:5432"
    networks:
      - pgnet
    command: sleep infinity

networks:
  pgnet:
    driver: bridge